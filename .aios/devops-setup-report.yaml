setup:
  completed: true
  date: "2026-03-06T00:00:00"
  project_type: node
  story_id: "5.10"

repository:
  url: https://github.com/wilderleal-aios/projeto-lixo.git
  owner: wilderleal-aios
  name: projeto-lixo
  default_branch: master

workflows_installed:
  - ci.yml
  - pr-automation.yml
  - release.yml

coderabbit:
  configured: true
  profile: assertive
  config_file: ".coderabbit.yaml"
  github_app_url: "https://github.com/apps/coderabbitai"
  base_branches:
    - master
    - develop

branch_protection:
  enabled: true
  branch: master
  required_checks:
    - lint
    - typecheck
    - test
  required_reviewers: 1
  dismiss_stale_reviews: true
  allow_force_pushes: false
  allow_deletions: false

secrets_configured: []

next_steps:
  - "Install CodeRabbit GitHub App: https://github.com/apps/coderabbitai"
  - "Create first PR to test CI/CD pipeline"
  - "Configure secrets as needed (Settings > Secrets)"

validation_checklist:
  - "[x] GitHub Actions workflows installed (ci, pr-automation, release)"
  - "[x] CodeRabbit configured (.coderabbit.yaml)"
  - "[x] Branch protection enabled (master)"
  - "[ ] Repository secrets configured (none yet)"
