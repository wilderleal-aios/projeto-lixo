# =============================================================================
# CodeRabbit Configuration
# =============================================================================
# Generated by: *setup-github task (Story 5.10)
# Project: projeto-lixo | Profile: balanced
# =============================================================================

version: 2
language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  abort_on_close: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "master"
      - "develop"
      - "release/*"

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/package-lock.json"
    - "!**/yarn.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/*.d.ts"

  path_instructions:
    - path: "src/**/*.ts"
      instructions: |
        TypeScript source code.
        CRITICAL: Hardcoded credentials, SQL injection, XSS, exposed sensitive data.
        HIGH: Strict typing violations, missing error handling, unhandled promise rejections.
        MEDIUM: Code duplication, complex functions (>50 lines), missing input validation.

    - path: "src/**/*.tsx"
      instructions: |
        React component files.
        FOCUS ON: Component prop typing, hook dependency arrays, key props, memory leaks, accessibility.

    - path: "**/*.test.ts"
      instructions: |
        Test files.
        VALIDATE: Edge cases covered, mocks properly typed, descriptive test names.
        DO NOT: Require JSDoc, flag test-specific patterns, suggest framework changes.

    - path: "src/api/**"
      instructions: |
        API endpoint files.
        CRITICAL: Missing input validation, SQL injection, XSS, authentication bypass.
        HIGH: Missing auth checks, inconsistent error responses.

    - path: "**/migrations/**"
      instructions: |
        Database migration files.
        CRITICAL: Data loss potential, missing rollback strategy, breaking schema changes.
        NEVER: Approve destructive migrations without explicit confirmation.

    - path: "docs/**"
      instructions: |
        Documentation files.
        VALIDATE: Clarity, completeness, correct code examples, valid links.
        DO NOT: Flag markdown style preferences.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
